<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股科技關係樹狀看板 - 盤後自動更新版</title>
<style>
:root{
  --bg:#0f0f10;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;
  --border:#2d2d30;--border2:#3f3f46;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --up:#ef4444;--dn:#22c55e;--accent:#6366f1;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
#wrap{max-width:1300px;margin:0 auto;padding:14px 16px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
h1{font-size:15px;font-weight:700;white-space:nowrap}
.root-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:200px;max-width:380px;position:relative}
.root-input{width:100%;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s}
.root-input:focus{border-color:var(--accent)}
.go-btn{padding:6px 14px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.go-btn:hover{opacity:.85}
.ac-box{position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.ac-item{padding:7px 10px;font-size:12px;cursor:pointer;display:flex;gap:8px;align-items:center}
.ac-item:hover{background:var(--bg4)}
.ac-code{color:var(--text2);min-width:36px;font-weight:600}
.ac-name{color:var(--text);min-width:70px}
.ac-ind{font-size:10px;color:var(--text3);flex:1;text-align:right}
.toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.toolbar input{flex:1;min-width:130px;max-width:190px;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg2);color:var(--text);outline:none}
.toolbar input:focus{border-color:var(--accent)}
.fbtn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s}
.fbtn.on{background:var(--bg4);color:var(--text);border-color:var(--border2);font-weight:500}
.fbtn:hover{background:var(--bg3)}
#status{font-size:11px;color:var(--text2);margin-bottom:8px;padding:5px 10px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.8;min-height:30px}
.stag{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;display:inline-block;white-space:nowrap}
.stag.twse{background:#14532d;color:#86efac}
.stag.tpex{background:#3b0764;color:#d8b4fe}
.stag.listed{background:#1e3a5f;color:#93c5fd}
.stag.otc{background:#3b1f5e;color:#c4b5fd}
.legend{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.badge{font-size:10px;padding:2px 6px;border-radius:9px;font-weight:500;white-space:nowrap;display:inline-block}
.bup{background:#14532d;color:#86efac}.bdn{background:#1e3a5f;color:#93c5fd}.bsub{background:#3b0764;color:#d8b4fe}
.bpeer{background:#27272a;color:#a1a1aa}.bcmp{background:#450a0a;color:#fca5a5}.broot{background:#1e1b4b;color:#a5b4fc}
.nrow{display:flex;align-items:center}
.iseg{width:18px;display:flex;justify-content:center;position:relative;flex-shrink:0;align-self:stretch}
.vl{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border)}
.hc{width:18px;position:relative;flex-shrink:0;align-self:stretch}
.hc .co{position:absolute;left:50%;top:0;bottom:50%;width:1px;background:var(--border)}
.hc .hb{height:1px;background:var(--border);width:100%;position:absolute;top:50%}
.tog{width:16px;height:16px;border:1px solid var(--border2);border-radius:3px;background:var(--bg2);color:var(--text2);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px}
.card{display:flex;align-items:center;gap:5px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);cursor:pointer;margin:2px 0;transition:all .12s;width:fit-content;max-width:820px}
.card.rc{border-color:var(--accent);background:var(--bg3)}
.sid{font-size:11px;color:var(--text2);font-weight:600;min-width:30px}
.sn{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;min-width:64px}
.pval{font-size:13px;font-weight:700;min-width:52px;text-align:right}
.pchg{font-size:10px;min-width:54px;text-align:right}
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--text3)}
.dp{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);padding:9px 13px;margin:3px 0 3px 38px;font-size:11px;line-height:1.8}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:3px 16px;margin-top:7px}
.di{display:flex;justify-content:space-between;gap:8px}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.tree-scroll{overflow-x:auto;padding-bottom:24px}
</style>
</head>
<body>
<div id="wrap">
  <div class="header">
      <h1>📊 台股科技關係樹狀看板</h1>
      <div class="root-wrap">
        <input type="text" id="root-input" class="root-input" placeholder="輸入代碼，例：2330" autocomplete="off" oninput="onRootInput(this.value)">
        <div id="ac-box" class="ac-box" style="display:none"></div>
        <button class="go-btn" onclick="applyRoot()">設為主軸</button>
      </div>
      <button class="fbtn" onclick="syncAll()">↻ 同步最新行情</button>
      <button class="fbtn" onclick="expandAll()">全展開</button>
      <button class="fbtn" onclick="collapseAll()">全收合</button>
    </div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="搜尋節點..." oninput="render()">
      <button class="fbtn on" data-f="all" onclick="setF('all',this)">全部</button>
      <button class="fbtn" data-f="upstream" onclick="setF('upstream',this)">上游</button>
      <button class="fbtn" data-f="downstream" onclick="setF('downstream',this)">下游</button>
    </div>

    <div id="sector-bar" class="legend" style="margin-bottom:12px; border-top:1px solid var(--border); padding-top:8px; display:flex; flex-wrap:wrap; gap:4px;">
      <span class="lnote" style="font-size:10px; color:var(--text3)">快速切換產業：</span>
    </div>

    <div class="legend">
      <span class="badge bup">上游供應</span><span class="badge bdn">下游客戶</span><span class="badge bsub">子/關係企業</span>
      <span class="badge bpeer">同業</span><span class="badge bcmp">競爭對手</span>
      <span class="stag listed">上市</span><span class="stag otc">上櫃</span>
    </div>

    <div id="status"><span class="spin"></span> 初始化中...</div>
    <div class="tree-scroll" id="tree"></div>
</div>

<script>
// --- 資料庫與狀態 ---
const STATIC_INFO = {}; // 由 API 動態填充
const REL_DB = {
  '2330':{name:'台積電',desc:'全球最大晶圓代工，AI核心',children:[
    {id:'3037',t:'upstream',d:'載板供應'},{id:'3711',t:'upstream',d:'封測夥伴'},
    {id:'2454',t:'downstream',d:'手機晶片客戶'},{id:'3661',t:'downstream',d:'AI ASIC客戶'}
  ]},
  '3037':{name:'欣興',desc:'ABF載板龍頭',children:[
    {id:'8046',t:'peer',d:'南電'},{id:'3189',t:'peer',d:'景碩'},{id:'2330',t:'downstream',d:'客戶：台積電'}
  ]},
  '3017':{name:'奇鋐',desc:'散熱模組龍頭',children:[
    {id:'3324',t:'peer',d:'雙鴻'},{id:'2421',t:'upstream',d:'風扇供應'},{id:'6669',t:'downstream',d:'伺服器客戶'}
  ]},
  '6806':{name:'森崴能源',desc:'綠能EPC工程',children:[
    {id:'1513',t:'peer',d:'中興電'},{id:'1519',t:'peer',d:'華城'},{id:'2412',t:'downstream',d:'綠電客戶'}
  ]}
};

const prices = {}, dynMarkets = {}, dynIndustries = {};
let expanded = new Set(['2330']), curF = 'all', detailId = null;
let currentRoot = '2330', currentTree = null;

// --- API 抓取邏輯 ---
async function syncAll() {
  setStatus('<span class="spin"></span> 正在同步全市場上市櫃資料...');
  try {
    // 1. 抓取基本資料 (上市 + 上櫃)
    const [resL, resO] = await Promise.all([
      fetch('https://cors-anywhere.herokuapp.com/'+'https://openapi.twse.com.tw/v1/opendata/t187ap03_L'),
      fetch('https://cors-anywhere.herokuapp.com/'+'https://www.tpex.org.tw/openapi/v1/mopsfin_t187ap03_O')
    ]);
    const [dataL, dataO] = await Promise.all([resL.json(), resO.json()]);

    dataL.forEach(i => {
      const c = i['公司代號'].trim();
      dynMarkets[c] = 'listed'; dynIndustries[c] = i['產業別'];
      STATIC_INFO[c] = [i['公司名稱'], i['產業別'], 'listed'];
    });
    dataO.forEach(i => {
      const c = (i['SecuritiesCompanyCode'] || i['公司代號']).trim();
      dynMarkets[c] = 'otc'; dynIndustries[c] = (i['Industry'] || i['產業別']);
      STATIC_INFO[c] = [i['CompanyName'] || i['公司名稱'], dynIndustries[c], 'otc'];
    });

    // 2. 抓取收盤行情
    const [qL, qO] = await Promise.all([
      fetch('https://cors-anywhere.herokuapp.com/'+'https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX_ALL'),
      fetch('https://cors-anywhere.herokuapp.com/'+'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes')
    ]);
    const [quotesL, quotesO] = await Promise.all([qL.json(), qO.json()]);

    quotesL.forEach(r => {
      const c = r['證券代號'], p = parseFloat(r['收盤價']), d = parseFloat(r['漲跌價差']) || 0;
      if(!isNaN(p)) prices[c] = {price:p, diff:d, chgPct:(d/(p-d))*100, vol:parseInt(r['成交股數']), source:'twse'};
    });
    quotesO.forEach(r => {
      const c = r['SecuritiesCompanyCode'], p = parseFloat(r['Close']), d = parseFloat(r['Change']) || 0;
      if(!isNaN(p)) prices[c] = {price:p, diff:d, chgPct:(d/(p-d))*100, vol:parseInt(r['TradingVolume']), source:'tpex'};
    });

    initSectorBar();
    applyRoot();
    setStatus(`✅ 已更新 ${Object.keys(prices).length} 支股票行情`);
  } catch (e) {
    setStatus('❌ 資料同步失敗，請確認網路連線');
    console.error("詳細錯誤資訊:", e);
  }
}

// --- UI 工具 ---
function initSectorBar() {
  const bar = document.getElementById('sector-bar');
  const sectors = [...new Set(Object.values(STATIC_INFO).map(v => v[1]))].filter(Boolean);
  const note = bar.querySelector('.lnote');
  bar.innerHTML = ''; bar.appendChild(note);
  sectors.slice(0, 15).forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'fbtn'; btn.textContent = sec;
    btn.onclick = () => {
      const code = Object.keys(STATIC_INFO).find(k => STATIC_INFO[k][1] === sec);
      if(code) { document.getElementById('root-input').value = code; applyRoot(); }
    };
    bar.appendChild(btn);
  });
}

function onRootInput(val) {
  const q = val.trim(), ac = document.getElementById('ac-box');
  if(!q) { ac.style.display='none'; return; }
  const matches = Object.entries(STATIC_INFO).filter(([c, i]) => c.startsWith(q) || i[0].includes(q)).slice(0, 10);
  ac.innerHTML = matches.map(([c, i]) => `<div class="ac-item" onclick="selectAC('${c}')"><span class="ac-code">${c}</span><span>${i[0]}</span></div>`).join('');
  ac.style.display = 'block';
}

function selectAC(c) { document.getElementById('root-input').value = c; document.getElementById('ac-box').style.display='none'; applyRoot(); }

function applyRoot() {
  currentRoot = document.getElementById('root-input').value || '2330';
  currentTree = buildTree(currentRoot);
  render();
}

function buildTree(id) {
  const info = REL_DB[id], name = STATIC_INFO[id]?.[0] || id;
  return {
    id, name, type:'root', desc: info?.desc || dynIndustries[id] || '',
    children: (info?.children || []).map(c => ({
      id: c.id, name: STATIC_INFO[c.id]?.[0] || c.id, type: c.t, desc: c.d,
      children: (REL_DB[c.id]?.children || []).slice(0, 3).map(gc => ({id: gc.id, name: STATIC_INFO[gc.id]?.[0] || gc.id, type: gc.t, desc: gc.d}))
    }))
  };
}

function render() {
  const container = document.getElementById('tree');
  container.innerHTML = '';
  const node = mkNode(currentTree, 0, []);
  if(node) container.appendChild(node);
}

function mkNode(n, depth, anc) {
  const p = prices[n.id] || {}, isExp = expanded.has(n.id), isDet = detailId === n.id;
  const wrap = document.createElement('div');
  const row = document.createElement('div'); row.className = 'nrow';

  // 繪製線條
  for(let i=0; i<depth; i++){
    const seg = document.createElement('div'); seg.className = 'iseg';
    if(i === depth-1) { row.appendChild(Object.assign(document.createElement('div'), {className:'hc', innerHTML:'<div class="co"></div><div class="hb"></div>'})); }
    else { row.appendChild(seg); }
  }

  const card = document.createElement('div'); card.className = `card ${n.type==='root'?'rc':''}`;
  card.onclick = () => { detailId = (isDet?null:n.id); render(); };
  
  const chg = p.chgPct || 0, cls = chg > 0 ? 'up' : chg < 0 ? 'dn' : 'neu';
  card.innerHTML = `<span class="sid">${n.id}</span><span class="sn">${n.name}</span>
    <span class="badge ${n.type==='root'?'broot':'bpeer'}">${n.type}</span>
    <span class="pval ${cls}">${p.price?.toFixed(2) || '---'}</span>
    <span class="pchg ${cls}">${chg.toFixed(2)}%</span>`;
  
  row.appendChild(card); wrap.appendChild(row);

  if(isDet) {
    const dp = document.createElement('div'); dp.className = 'dp';
    dp.innerHTML = `<strong>${n.name} (${n.id})</strong><br>${n.desc}<br>成交量: ${Math.round(p.vol/1000)||0}張 | 來源: ${p.source||'N/A'}`;
    wrap.appendChild(dp);
  }

  if(isExp && n.children) n.children.forEach(c => wrap.appendChild(mkNode(c, depth+1, [])));
  return wrap;
}

function setStatus(h) { document.getElementById('status').innerHTML = h; }
function expandAll() { Object.keys(REL_DB).forEach(k => expanded.add(k)); render(); }
function collapseAll() { expanded.clear(); expanded.add(currentRoot); render(); }
function setF(f, b) { curF = f; document.querySelectorAll('.fbtn').forEach(btn => btn.classList.remove('on')); b.classList.add('on'); render(); }

// 初始化
syncAll();
</script>
</body>
</html>
