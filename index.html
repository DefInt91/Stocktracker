<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股科技關係樹狀看板</title>
<style>
:root{
  --bg:#0f0f10;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;
  --border:#2d2d30;--border2:#3f3f46;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --up:#ef4444;--dn:#22c55e;--accent:#6366f1;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
#wrap{max-width:1300px;margin:0 auto;padding:14px 16px}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
h1{font-size:15px;font-weight:700;white-space:nowrap}
.root-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:200px;max-width:380px;position:relative}
.root-input{width:100%;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--bg3);color:var(--text);outline:none;transition:border-color .15s}
.root-input:focus{border-color:var(--accent)}
.go-btn{padding:6px 14px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.go-btn:hover{opacity:.85}
.ac-box{position:absolute;top:calc(100%+4px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.ac-item{padding:7px 10px;font-size:12px;cursor:pointer;display:flex;gap:8px;align-items:center}
.ac-item:hover{background:var(--bg4)}
.ac-code{color:var(--text2);min-width:36px;font-weight:600}
.ac-name{color:var(--text);min-width:70px}
.ac-ind{font-size:10px;color:var(--text3);flex:1;text-align:right}
.toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.toolbar input{flex:1;min-width:130px;max-width:190px;padding:5px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg2);color:var(--text);outline:none}
.toolbar input:focus{border-color:var(--accent)}
.fbtn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .12s}
.fbtn.on{background:var(--bg4);color:var(--text);border-color:var(--border2);font-weight:500}
.fbtn:hover{background:var(--bg3)}
#status{font-size:11px;color:var(--text2);margin-bottom:8px;padding:5px 10px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.8;min-height:30px}
.stag{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;display:inline-block;white-space:nowrap}
.stag.twse{background:#14532d;color:#86efac}
.stag.yahoo{background:#78350f;color:#fcd34d}
.stag.date{background:#3b0764;color:#d8b4fe}
.stag.listed{background:#1e3a5f;color:#93c5fd}
.stag.otc{background:#3b1f5e;color:#c4b5fd}
.stag.emerging{background:#1c3a2f;color:#6ee7b7}
.legend{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.lnote{font-size:10px;color:var(--text3)}
.badge{font-size:10px;padding:2px 6px;border-radius:9px;font-weight:500;white-space:nowrap;display:inline-block}
.bup{background:#14532d;color:#86efac}
.bdn{background:#1e3a5f;color:#93c5fd}
.bsub{background:#3b0764;color:#d8b4fe}
.bpeer{background:#27272a;color:#a1a1aa}
.bcmp{background:#450a0a;color:#fca5a5}
.broot{background:#1e1b4b;color:#a5b4fc}
.nrow{display:flex;align-items:center}
.iseg{width:18px;display:flex;justify-content:center;position:relative;flex-shrink:0;align-self:stretch}
.vl{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border)}
.hc{width:18px;position:relative;flex-shrink:0;align-self:stretch}
.hc .co{position:absolute;left:50%;top:0;bottom:50%;width:1px;background:var(--border)}
.hc .hb{height:1px;background:var(--border);width:100%;position:absolute;top:50%}
.tog{width:16px;height:16px;border:1px solid var(--border2);border-radius:3px;background:var(--bg2);color:var(--text2);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:4px}
.tog:hover{background:var(--bg4)}
.card{display:flex;align-items:center;gap:5px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);cursor:pointer;margin:2px 0;transition:border-color .12s,background .12s;min-width:0;width:fit-content;max-width:820px}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.rc{border-color:var(--accent);background:var(--bg3)}
.sid{font-size:11px;color:var(--text2);font-weight:600;min-width:30px;flex-shrink:0}
.sn{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;flex-shrink:0;min-width:64px}
.ind-t{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;flex-shrink:0}
.pval{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;min-width:52px;text-align:right;flex-shrink:0}
.pchg{font-size:10px;min-width:54px;text-align:right;flex-shrink:0}
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--text3)}
.volp{font-size:10px;color:var(--text3);min-width:44px;text-align:right;flex-shrink:0}
.pep{font-size:10px;color:var(--text3);min-width:42px;text-align:right;flex-shrink:0}
.dp{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);padding:9px 13px;margin:3px 0 3px 38px;font-size:11px;line-height:1.8;max-width:700px}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:3px 16px;margin-top:7px}
.di{display:flex;justify-content:space-between;gap:8px}
.dl{color:var(--text2)}.dv{font-weight:500;color:var(--text)}
.rn{font-size:10px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.spin{display:inline-block;width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--text2);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.tree-scroll{overflow-x:auto;padding-bottom:24px}
.empty-msg{color:var(--text3);font-size:13px;padding:28px;text-align:center}
</style>
</head>
<body>
<div id="wrap">
  <div class="header">
      <h1>📊 台股科技關係樹狀看板</h1>
      <div class="root-wrap">
        <input type="text" id="root-input" class="root-input" placeholder="輸入主軸代號，例：2330" autocomplete="off"
          oninput="onRootInput(this.value)" onkeydown="if(event.key==='Enter')applyRoot();if(event.key==='Escape')hideAC()">
        <div id="ac-box" class="ac-box" style="display:none"></div>
        <button class="go-btn" onclick="applyRoot()">設為主軸</button>
      </div>
      <button class="fbtn" onclick="loadAll()">↻ 更新報價</button>
      <button class="fbtn" onclick="expandAll()">全展開</button>
      <button class="fbtn" onclick="collapseAll()">全收合</button>
    </div>
    <div class="toolbar">
      <input type="text" id="search" placeholder="搜尋節點..." oninput="render()">
      <button class="fbtn on" data-f="all" onclick="setF('all',this)">全部</button>
      <button class="fbtn" data-f="upstream" onclick="setF('upstream',this)">上游</button>
      <button class="fbtn" data-f="downstream" onclick="setF('downstream',this)">下游</button>
      <button class="fbtn" data-f="subsidiary" onclick="setF('subsidiary',this)">子公司</button>
      <button class="fbtn" data-f="peer" onclick="setF('peer',this)">同業</button>
      <button class="fbtn" data-f="competitor" onclick="setF('competitor',this)">競爭</button>
    </div>
    <div id="sector-bar" class="legend" style="margin-bottom: 12px; border-top: 1px solid var(--border); padding-top: 8px;">
      <span class="lnote" style="margin-right: 5px;">快速顯示產業：</span>
    </div>
    <div class="legend">
      <span class="badge bup">上游供應</span><span class="badge bdn">下游客戶</span>
      <span class="badge bsub">子/關係企業</span><span class="badge bpeer">同業</span><span class="badge bcmp">競爭對手</span>
      <span class="stag listed" style="font-size:10px">上市</span><span class="stag otc" style="font-size:10px">上櫃</span><span class="stag emerging" style="font-size:10px">興櫃</span>
      <span class="lnote">— 標籤為與上層節點的關係｜點擊節點展開詳情</span>
    </div>
    <div id="status"><span class="spin"></span> 初始化中...</div>
    <div class="tree-scroll" id="tree"></div>
    <div style="margin-top:14px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text3)">

</div>

function buildTree(rootId){
  const info=REL_DB[rootId];
  const name=getName(rootId);
  if(!info) return {id:rootId,name,type:'root',desc:'此股票供應鏈資料建立中',children:[]};
  return {
    id:rootId, name, type:'root', desc:info.desc||getSector(rootId),
    children:(info.children||[]).map(c=>({
      id:c.id, name:getName(c.id), type:c.t, desc:c.d,
      children:getLevel2(c.id, rootId)
    }))
  };
}
function getLevel2(id, exclude){
  const info=REL_DB[id];
  if(!info) return [];
  return (info.children||[]).filter(c=>c.id!==exclude&&c.id!==id).slice(0,5).map(c=>({
    id:c.id, name:getName(c.id), type:c.t, desc:c.d, children:[]
  }));
}

function isNumId(id){return /^\d{4,5}$/.test(id);}
function tsToDate(ts){
  if(!ts)return'';
  const dt=new Date((ts+28800)*1000);
  return`${dt.getUTCFullYear()}/${String(dt.getUTCMonth()+1).padStart(2,'0')}/${String(dt.getUTCDate()).padStart(2,'0')}`;
}
async function fetchYahoo(id){
  if(!isNumId(id))return null;
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?interval=1d&range=10d`);
    if(!r.ok)return null;
    const d=await r.json();
    const res=d?.chart?.result?.[0];
    if(!res)return null;
    const meta=res.meta,ts=res.timestamp||[],q=res.indicators?.quote?.[0]||{};
    const closes=q.close||[],opens=q.open||[],highs=q.high||[],lows=q.low||[],vols=q.volume||[];
    let li=-1;
    for(let i=closes.length-1;i>=0;i--){if(closes[i]!=null&&closes[i]>0){li=i;break;}}
    if(li<0)return null;
    const close=closes[li];
    const prev=li>0?(closes[li-1]||meta.chartPreviousClose||close):(meta.chartPreviousClose||close);
    const diff=close-(prev||close),chgPct=prev&&prev!==close?diff/prev*100:0;
    return{price:close,chgPct,diff,vol:vols[li]||0,open:opens[li]||null,high:highs[li]||null,low:lows[li]||null,pe:meta.trailingPE||null,tradeDate:tsToDate(ts[li]),source:'yahoo'};
  }catch(e){return null;}
}
async function fetchTWSE(){
  const ref=prices[currentRoot];
  if(!ref?.tradeDate)return null;
  const ds=ref.tradeDate.replace(/\//g,'');
  try{
    const r=await fetch(`https://www.twse.com.tw/exchangeReport/MI_INDEX?response=json&date=${ds}&type=ALL`);
    if(!r.ok)return null;
    const d=await r.json();
    const f=d.fields9,rows=d.data9;
    if(!f||!rows||rows.length===0)return null;
    const fi=n=>f.indexOf(n);
    const iC=fi('證券代號'),iCl=fi('收盤價'),iDf=fi('漲跌價差'),iSg=fi('漲跌(+/-)'),
          iV=fi('成交股數'),iP=fi('本益比'),iO=fi('開盤價'),iH=fi('最高價'),iL=fi('最低價');
    const result={};
    rows.forEach(row=>{
      const code=(row[iC]||'').trim();
      if(!code)return;
      const close=parseFloat((row[iCl]||'').replace(/,/g,''));
      if(isNaN(close)||close===0)return;
      const rawDiff=parseFloat((row[iDf]||'').replace(/,/g,''))||0;
      const sign=(row[iSg]||'').includes('-')?-1:1;
      const diff=sign*Math.abs(rawDiff);
      const prev=close-diff;
      result[code]={price:close,chgPct:prev>0?diff/prev*100:0,diff,
        vol:parseInt((row[iV]||'').replace(/,/g,''))||0,
        pe:parseFloat((row[iP]||'').replace(/,/g,''))||null,
        open:parseFloat((row[iO]||'').replace(/,/g,''))||null,
        high:parseFloat((row[iH]||'').replace(/,/g,''))||null,
        low:parseFloat((row[iL]||'').replace(/,/g,''))||null,
        tradeDate:ref.tradeDate,source:'twse'};
    });
    return Object.keys(result).length>50?result:null;
  }catch(e){return null;}
}

async function fetchDailyQuotes() {

    const resL = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX_ALL');

      const code = row['證券代號'];
      const price = parseFloat(row['收盤價']);
      if(isNaN(price)) return;
      const diff = parseFloat(row['漲跌價差']) || 0;
      prices[code] = {
        price: price,
        diff: diff,
        chgPct: (diff / (price - diff)) * 100,
        vol: parseInt(row['成交股數']) || 0,
        pe: parseFloat(row['本益比']) || null,
        tradeDate: new Date().toLocaleDateString(),
        source: 'twse'

      const code = row['SecuritiesCompanyCode'];
      const price = parseFloat(row['Close']);
      if(isNaN(price)) return;
      const diff = parseFloat(row['Change']) || 0;
      prices[code] = {
        price: price,
        diff: diff,
        chgPct: (diff / (price - diff)) * 100,
        vol: parseInt(row['TradingVolume']) || 0,
        pe: parseFloat(row['P/E_Ratio']) || null,

  const el=document.createElement('span');el.className=`stag ${m}`;el.style.cssText='font-size:9px;padding:1px 5px';el.textContent=lbl;return el;
}
function setF(f,btn){curF=f;document.querySelectorAll('.fbtn[data-f]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
function expandAll(){allNodes(currentTree).forEach(n=>expanded.add(n.id));render();}
function collapseAll(){expanded.clear();expanded.add(currentRoot);render();}
function vis(n,q){return(curF==='all'||n.type==='root'||n.type===curF)&&(!q||(n.id.includes(q)||n.name.includes(q)));}
function hasVis(n,q){if(vis(n,q))return true;return(n.children||[]).some(c=>hasVis(c,q));}

function mkNode(n,depth,pMore,anc,q){
  if(!hasVis(n,q))return null;
  const p=prices[n.id]||{};
  const sec=dynIndustries[n.id]||getSector(n.id);
  const isExp=expanded.has(n.id);
  const vk=(n.children||[]).filter(c=>hasVis(c,q));
  const isDet=detailId===n.id;
  const numId=isNumId(n.id);

  const wrap=document.createElement('div');
  const row=document.createElement('div');row.className='nrow';

  if(depth>0){
    for(let i=0;i<depth-1;i++){
      const seg=document.createElement('div');seg.className='iseg';
      if(anc[i]){const vl=document.createElement('div');vl.className='vl';seg.appendChild(vl);}
      row.appendChild(seg);
    }
    const hc=document.createElement('div');hc.className='hc';
    hc.innerHTML='<div class="co"></div><div class="hb"></div>';
    row.appendChild(hc);
  }
  const tog=document.createElement('button');tog.className='tog';
  if(vk.length){tog.textContent=isExp?'−':'+';tog.onclick=e=>{e.stopPropagation();isExp?expanded.delete(n.id):expanded.add(n.id);render();};}
  else{tog.textContent='·';tog.style.opacity='.2';tog.style.cursor='default';}
  row.appendChild(tog);

  const card=document.createElement('div');card.className='card'+(n.type==='root'?' rc':'');
  card.onclick=()=>{detailId=detailId===n.id?null:n.id;render();};

  const sid=document.createElement('span');sid.className='sid';sid.textContent=numId?n.id:'';card.appendChild(sid);
  const sn=document.createElement('span');sn.className='sn';sn.textContent=n.name;card.appendChild(sn);
  if(sec){const it=document.createElement('span');it.className='ind-t';it.textContent=sec;it.title=sec;card.appendChild(it);}
  const mt=mkMktTag(n.id);if(mt)card.appendChild(mt);
  const bdg=document.createElement('span');bdg.className=bCls(n.type);bdg.textContent=bLbl(n.type);card.appendChild(bdg);

  const pc=p.price,ch=p.chgPct||0,cls=ch>0.01?'up':ch<-0.01?'dn':'neu';
  const pv=document.createElement('span');
  pv.className='pval '+cls;pv.textContent=pc?pc.toFixed(2):'---';card.appendChild(pv);
  const pchg=document.createElement('span');
  if(pc){pchg.className='pchg '+cls;pchg.textContent=(ch>0.01?'▲':ch<-0.01?'▼':'─')+Math.abs(ch).toFixed(2)+'%';}
  else{pchg.className='pchg neu';}
  card.appendChild(pchg);
  const volEl=document.createElement('span');volEl.className='volp';volEl.textContent=fmtV(p.vol);card.appendChild(volEl);
  const peEl=document.createElement('span');peEl.className='pep';peEl.textContent=p.pe?'P/E '+p.pe.toFixed(1):'';card.appendChild(peEl);

  row.appendChild(card);wrap.appendChild(row);

  if(isDet){
    const dp=document.createElement('div');dp.className='dp';
    const srcT=p.source==='twse'?'<span class="stag twse">TWSE官方</span>':p.source==='yahoo'?'<span class="stag yahoo">Yahoo</span>':'';
    const dateI=p.tradeDate?`<span class="stag date" style="margin-left:2px">${p.tradeDate}</span>`:'';
    const mktN=dynMarkets[n.id]||getMarket(n.id);
    const mktH=mktN?`<span class="stag ${mktN}" style="margin-left:2px">${mktN==='listed'?'上市':mktN==='otc'?'上櫃':'興櫃'}</span>`:'';
    const dcls=ch>0.01?'up':ch<-0.01?'dn':'neu';
    let html=`<strong>${numId?n.id+' ':''}${n.name}</strong>${mktH} ${srcT}${dateI}<br><span style="color:var(--text2);font-size:11px">${n.desc}</span>`;
    if(pc){
      html+=`<div class="dg">
        <div class="di"><span class="dl">收盤價</span><span class="dv ${dcls}">${pc.toFixed(2)}</span></div>
        <div class="di"><span class="dl">漲跌</span><span class="dv ${dcls}">${(p.diff||0)>=0?'+':''}${(p.diff||0).toFixed(2)} (${ch.toFixed(2)}%)</span></div>
        ${p.open?`<div class="di"><span class="dl">開盤</span><span class="dv">${p.open.toFixed(2)}</span></div>`:''}
        ${p.high?`<div class="di"><span class="dl">最高</span><span class="dv">${p.high.toFixed(2)}</span></div>`:''}
        ${p.low?`<div class="di"><span class="dl">最低</span><span class="dv">${p.low.toFixed(2)}</span></div>`:''}
        ${p.vol?`<div class="di"><span class="dl">成交量</span><span class="dv">${fmtV(p.vol)}</span></div>`:''}
        ${p.pe?`<div class="di"><span class="dl">本益比</span><span class="dv">${p.pe.toFixed(1)}</span></div>`:''}
      </div>`;
    }else{html+=`<div style="margin-top:6px;color:var(--text3)">無法取得股價資料</div>`;}
    if(sec)html+=`<div class="di" style="margin-top:6px"><span class="dl">TWSE產業分類</span><span class="dv">${sec}</span></div>`;
    html+=`<div class="rn">標籤為與上層節點的關係｜供應鏈資料人工整理，非投資建議｜非即時</div>`;
    dp.innerHTML=html;wrap.appendChild(dp);
  }

  if(vk.length&&isExp){
    const cw=document.createElement('div');cw.style.paddingLeft='18px';
    const na=[...anc,pMore];
    vk.forEach((c,i)=>{const el=mkNode(c,depth+1,i<vk.length-1,na,q);if(el)cw.appendChild(el);});
    wrap.appendChild(cw);
  }
  return wrap;
}

function render(){
  const q=document.getElementById('search').value.trim();
  const c=document.getElementById('tree');c.innerHTML='';
  if(!currentTree){c.innerHTML='<div class="empty-msg">請輸入股票代號並按「設為主軸」</div>';return;}
  const el=mkNode(currentTree,0,false,[],q);
  if(el)c.appendChild(el);
  else c.innerHTML='<div class="empty-msg">無符合條件的節點</div>';
}

// ================================================================
// 初始化
// ================================================================
// 3. 修改後的初始化流程
(async () => {
  // 第一步：先拿清單與產業分類
  await fetchFullMarketMap();
  
  // 第二步：拿最新報價 (這會直接填滿全市場，不需要再一支一支呼叫 Yahoo)
  await fetchDailyQuotes();
  
  // 剩餘的渲染邏輯
  document.getElementById('root-input').value = currentRoot;
  currentTree = buildTree(currentRoot);
  expanded.add(currentRoot);
  render();
  
  setStatus(`✅ 資料更新完成。共載入 ${Object.keys(prices).length} 支上市櫃股票行情`);
})();
</script>
